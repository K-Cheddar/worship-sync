name: Auto Release

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: [master]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic_release.outputs.published }}
      version: ${{ steps.semantic_release.outputs.version }}
      tag: ${{ steps.semantic_release.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_RELEASE_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm ci
        working-directory: client

      - name: Test
        run: npm test
        working-directory: client

      - name: Build web
        run: npm run build
        working-directory: client
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Configure git for version.json commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic release
        id: semantic_release
        run: npm run release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_PAT }}

  build-electron:
    name: Build Electron
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0
          token: ${{ secrets.GH_RELEASE_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm ci
        working-directory: client

      - name: Build Electron app
        run: npm run build:electron
        working-directory: client
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never
        working-directory: client

      - name: Package Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never --config electron-builder.config.js
        working-directory: client

      - name: Package macOS (unsigned)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never --config electron-builder.config.js
        working-directory: client
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            client/dist/*.exe
            client/dist/*.exe.blockmap
            client/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_PAT }}

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            client/dist/*.AppImage
            client/dist/*.deb
            client/dist/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_PAT }}

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            client/dist/*.dmg
            client/dist/*.dmg.blockmap
            client/dist/*.zip
            client/dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_PAT }}

  deploy-heroku:
    name: Deploy Heroku
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0
          token: ${{ secrets.GH_RELEASE_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm ci
        working-directory: client

      - name: Build web
        run: npm run build
        working-directory: client
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git remote add heroku https://heroku:$HEROKU_API_KEY@git.heroku.com/${{ secrets.HEROKU_APP_NAME }}.git
          git add .
          git commit -m "chore(release): deploy" || true
          git push heroku HEAD:refs/heads/main --force
